name: Build and Deploy Django App to Azure

# متى يعمل هذا الملف؟ عند رفع أي تعديل على الفرع main
on:
  push:
    branches:
      - main # إذا كان الفرع الأساسي عندك اسمه master، قم بتغيير هذه الكلمة

env:
  IMAGE_NAME: library-app
  AZURE_WEBAPP_NAME: rsu-library-webapp # سنقوم بتغيير هذا لاحقاً لاسم تطبيقك الفعلي في Azure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود الخاص بك من المستودع
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. تسجيل الدخول إلى مخزن الحاويات في Azure (ACR)
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. بناء صورة الدوكر ورفعها إلى مخزن Azure
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 4. تحديث تطبيق الويب في Azure ليعمل بالصورة الجديدة
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: '${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
